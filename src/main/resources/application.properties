# ============================================================
# application.properties — School Management System
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/api

# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT  ${JWT_SECRET}
app.jwt.secret=SchoolMgmtSuperSecretKey2024ChangeThisInProduction!
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# Logging
logging.level.com.school=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG

# Thymeleaf
spring.thymeleaf.cache=false